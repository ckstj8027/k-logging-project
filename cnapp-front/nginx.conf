server {
    listen 80;
    server_name localhost;

    # The root directory for serving static files
    root /usr/share/nginx/html;
    index index.html;

    # This is the crucial part for single-page applications (SPAs)
    location / {
        # Try to serve the requested file directly, then as a directory,
        # and if neither exists, fall back to serving /index.html.
        # This allows SvelteKit's client-side router to handle the path.
        try_files $uri $uri/ /index.html;
    }

    # Optional: You can add specific caching rules for assets here
    # location ~* \.(?:jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc|css|js)$ {
    #   expires 1M;
    #   add_header Cache-Control "public";
    # }
}
