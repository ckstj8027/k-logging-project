apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress
  annotations:
    kubernetes.io/ingress.class: {{ .Values.ingress.className | quote }}
    # [중요] rewrite-target을 제거하여 프론트엔드/백엔드가 자신의 경로를 그대로 인식하게 합니다.
spec:
  rules:
  - http:
      paths:
      # 1. 인증/회원가입 (msa-auth-service)
      - path: /api/auth
        pathType: Prefix
        backend:
          service:
            name: {{ .Release.Name }}-auth-service
            port:
              number: 8084
      # 2. 대시보드 API (msa-query-service)
      - path: /api/v1/dashboard
        pathType: Prefix
        backend:
          service:
            name: {{ .Release.Name }}-query-service
            port:
              number: 80
      # 3. 에이전트 수집 API (msa-ingestion-service)
      - path: /api/v1/ingestion
        pathType: Prefix
        backend:
          service:
            name: {{ .Release.Name }}-ingestion-service
            port:
              number: 8081
      # 4. 프론트엔드 (SvelteKit)
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ .Release.Name }}-front-service
            port:
              number: 80
