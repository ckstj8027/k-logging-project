apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress
  annotations:
    kubernetes.io/ingress.class: {{ .Values.ingress.className | quote }}
spec:
  rules:
  - http:
      paths:
      # 1. 인증 관련 (8084 서비스 포트로 전달)
      - path: /api/signup
        pathType: Prefix
        backend:
          service:
            name: {{ .Release.Name }}-auth-service
            port:
              number: 8084
      - path: /api/login
        pathType: Prefix
        backend:
          service:
            name: {{ .Release.Name }}-auth-service
            port:
              number: 8084

      # 2. 에이전트 수집 (8081 서비스 포트로 전달)
      - path: /api/v1/ingestion
        pathType: Prefix
        backend:
          service:
            name: {{ .Release.Name }}-ingestion-service
            port:
              number: 8081

      # 3. 대시보드 API (80 서비스 포트로 전달)
      - path: /api/v1/dashboard
        pathType: Prefix
        backend:
          service:
            name: {{ .Release.Name }}-query-service
            port:
              number: 80

      # 4. 프론트엔드 (80 서비스 포트로 전달)
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ .Release.Name }}-front-service
            port:
              number: 80
