apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress
  annotations:
    kubernetes.io/ingress.class: {{ .Values.ingress.className | quote }}

spec:
  ingressClassName: {{ .Values.ingress.className | quote }}
  rules:
  - http:
      paths:
      # 1. 인증/회원가입 (msa-auth-service)
      - path: /api/signup
        pathType: Prefix
        backend:
          service:
            name: {{ .Release.Name }}-auth-service
            port:
              number: 8084
      - path: /api/login
        pathType: Prefix
        backend:
          service:
            name: {{ .Release.Name }}-auth-service
            port:
              number: 8084

      # 2. 대시보드 조회 (msa-query-service)
      # 프론트가 부르는 모든 /api 요청 중 auth/ingestion 제외한 나머지를 담당
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: {{ .Release.Name }}-query-service
            port:
              number: 80

      # 3. 에이전트 수집 API (msa-ingestion-service)
      - path: /api/v1/ingestion
        pathType: Prefix
        backend:
          service:
            name: {{ .Release.Name }}-ingestion-service
            port:
              number: 8081

      # 4. 프론트엔드 (나머지 전체)
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ .Release.Name }}-front-service
            port:
              number: 80
