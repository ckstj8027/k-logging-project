apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress
  annotations:
    kubernetes.io/ingress.class: {{ .Values.ingress.className | quote }}
    # [필독] 모든 rewrite 설정을 제거하여 경로를 원본 그대로 보냅니다.
spec:
  rules:
  - http:
      paths:
      # 1. 인증/회원가입 (가장 먼저 매칭)
      - path: /api/auth
        pathType: Prefix
        backend:
          service:
            name: {{ .Release.Name }}-auth-service
            port:
              number: 8084
      # 2. 에이전트 수집
      - path: /api/v1/ingestion
        pathType: Prefix
        backend:
          service:
            name: {{ .Release.Name }}-ingestion-service
            port:
              number: 8081
      # 3. 대시보드 API
      - path: /api/v1/dashboard
        pathType: Prefix
        backend:
          service:
            name: {{ .Release.Name }}-query-service
            port:
              number: 80
      # 4. 프론트엔드 (나머지 전체)
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ .Release.Name }}-front-service
            port:
              number: 80
