# [K-Sentry 공식 명세 준수] 모든 인프라 PV 설정
apiVersion: v1
kind: PersistentVolume
metadata:
  name: msa-postgres-pv
spec:
  capacity:
    storage: 8Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: "/mnt/data/postgres-msa" # [공식] /mnt/data/msa-postgres 아님
---
