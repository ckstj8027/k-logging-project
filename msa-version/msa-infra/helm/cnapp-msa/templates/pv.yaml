# 로컬/테스트 환경을 위한 수동 PV 설정
# StorageClass가 없는 환경에서도 PVC가 바인딩될 수 있도록 지원합니다.

# PostgreSQL 전용 PV
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ .Release.Name }}-postgres-pv
spec:
  capacity:
    storage: 8Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: "/mnt/data/postgres-msa"
---
# Kafka 전용 PV
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ .Release.Name }}-kafka-pv
spec:
  capacity:
    storage: 8Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: "/mnt/data/kafka-msa"
---
# Redis 전용 PV
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ .Release.Name }}-redis-pv
spec:
  capacity:
    storage: 4Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: "/mnt/data/redis-msa"
