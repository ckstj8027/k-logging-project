# [명세 준수] 모든 인프라 PV 설정 통합
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ .Release.Name }}-postgres-pv
spec:
  capacity:
    storage: 8Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: "/mnt/data/msa-postgres"
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ .Release.Name }}-kafka-pv
spec:
