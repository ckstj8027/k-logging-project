# 로컬/테스트 환경을 위한 수동 PV 설정
# StorageClass가 없는 환경에서도 PVC가 바인딩될 수 있도록 지원합니다.

apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ .Release.Name }}-postgresql-pv
spec:
  capacity:
    storage: 8Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: "/mnt/data/postgresql"
---
