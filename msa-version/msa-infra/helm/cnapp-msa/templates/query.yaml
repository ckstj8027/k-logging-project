apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-query
  labels:
    app: query
spec:
  replicas: {{ .Values.query.replicaCount }}
  selector:
    matchLabels:
      app: query
  template:
    metadata:
      labels:
        app: query
    spec:
      # [추가] 인프라 대기 로직: DB와 Redis가 준비될 때까지 대기
      initContainers:
        - name: wait-for-infra
          image: busybox
          command: 
            - sh
            - -c
            - |
              until nc -z postgres-service 5432 && nc -z redis-service 6379; do
                echo "Waiting for Postgres and Redis..."
                sleep 2
              done
              echo "Infra is ready. Starting Query service."
      containers:
        - name: query
          image: "{{ .Values.query.image.repository }}:{{ .Values.query.image.tag }}"
          imagePullPolicy: Always
          ports:
            - containerPort: 8083
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres-service:5432/{{ .Values.database.dbName }}"
            - name: SPRING_DATASOURCE_USERNAME
              value: "{{ .Values.database.user }}"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "{{ .Values.database.pass }}"
            - name: SPRING_DATA_REDIS_HOST
              value: "redis-service"
            - name: SPRING_DATA_REDIS_PORT
              value: "6379"
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-query-service
spec:
  ports:
    - port: 80
      targetPort: 8083
  selector:
    app: query
