apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-query
  labels:
    app: query
spec:
  replicas: {{ .Values.query.replicaCount }}
  selector:
    matchLabels:
      app: query
  template:
    metadata:
      labels:
        app: query
    spec:
      containers:
        - name: query
          image: "{{ .Values.query.image.repository }}:{{ .Values.query.image.tag }}"
          imagePullPolicy: Always
          ports:
            - containerPort: 8083
          env:
            - name: JDBC_URL
              value: "jdbc:postgresql://postgres-service:5432/{{ .Values.database.dbName }}"
            - name: JDBC_USER
              value: "{{ .Values.database.user }}"
            - name: JDBC_PASS
              value: "{{ .Values.database.pass }}"
            - name: REDIS_HOST
              value: "redis-service"
            - name: REDIS_PORT
              value: "6379"
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-query
spec:
  type: {{ .Values.query.service.port | default "LoadBalancer" | quote }} # values.yaml의 query.service.port는 실제 포트 번호이므로 주의
  ports:
    - port: 80
      targetPort: 8083
  selector:
    app: query
