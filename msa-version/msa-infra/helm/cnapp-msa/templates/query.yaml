apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-query
  labels:
    app: query
spec:
  replicas: {{ .Values.query.replicaCount }}
  selector:
    matchLabels:
      app: query
  template:
    metadata:
      labels:
        app: query
    spec:
      containers:
        - name: query
          image: "{{ .Values.query.image.repository }}:{{ .Values.query.image.tag }}"
          ports:
            - containerPort: 8083
          env:
            - name: JDBC_URL
              value: {{ .Values.database.url | quote }}
            - name: JDBC_USER
              value: {{ .Values.database.user | quote }}
            - name: JDBC_PASS
              value: {{ .Values.database.pass | quote }}
            - name: REDIS_HOST
              value: "redis-service"
            - name: REDIS_PORT
              value: "6379"
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-query
spec:
  type: {{ .Values.query.service.type }}
  ports:
    - port: {{ .Values.query.service.port }}
      targetPort: 8083
  selector:
    app: query
