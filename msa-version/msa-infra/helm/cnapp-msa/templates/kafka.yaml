# [K-Sentry 공식 명세 준수] Kafka (No ZooKeeper)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: data-kafka-service-0 # [공식] 예상 PVC 이름 준수
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 8Gi
  volumeName: msa-kafka-pv # [공식] PV 이름 강제 바인딩
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: {{ .Values.kafka.image }}
          env:
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://:9092,CONTROLLER://:9093"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka-service:9092"
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "1@kafka-service:9093"
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_LOG_DIRS
              value: "/var/lib/kafka/data"
          ports:
            - containerPort: 9092
            - containerPort: 9093
          volumeMounts:
            - name: storage
              mountPath: /var/lib/kafka/data
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: data-kafka-service-0
