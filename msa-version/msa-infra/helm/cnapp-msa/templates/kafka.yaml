# Apache Kafka 3.7.0 (KRaft Mode - No ZooKeeper)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: {{ .Values.kafka.image }}
          ports:
            - containerPort: {{ .Values.kafka.port }}
            - containerPort: {{ .Values.kafka.controllerPort }}
          env:
            # KRaft 핵심 설정
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "1@localhost:{{ .Values.kafka.controllerPort }}"
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://:{{ .Values.kafka.port }},CONTROLLER://:{{ .Values.kafka.controllerPort }}"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://{{ .Values.kafka.serviceName }}:{{ .Values.kafka.port }}"
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
            # 메타데이터 로그 디렉토리
            - name: KAFKA_LOG_DIRS
              value: "/tmp/kafka-logs"
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.kafka.serviceName }}
spec:
  ports:
    - port: {{ .Values.kafka.port }}
      name: client
    - port: {{ .Values.kafka.controllerPort }}
      name: controller
  selector:
    app: kafka
