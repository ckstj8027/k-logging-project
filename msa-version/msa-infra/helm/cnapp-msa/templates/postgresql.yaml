# [K-Sentry 공식 명세] PostgreSQL PVC & Deployment (강제 보안 해제 버전)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: msa-postgres-pvc
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: manual
  resources:
    requests:
      storage: 8Gi
  volumeName: msa-postgres-pv
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-deployment
spec:
  selector:
    matchLabels:
      app: postgres
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: postgres
    spec:
      # [핵심] 기존 볼륨에 남아있는 restrictive한 설정을 강제로 덮어씁니다.
      initContainers:
        - name: fix-pg-hba
          image: busybox
          command: 
            - sh
            - -c
            - |
              if [ -f /var/lib/postgresql/data/pg_hba.conf ]; then
                echo "host all all 0.0.0.0/0 trust" >> /var/lib/postgresql/data/pg_hba.conf
                echo "host all all ::/0 trust" >> /var/lib/postgresql/data/pg_hba.conf
                echo "Forcefully updated pg_hba.conf to trust all"
              fi
          volumeMounts:
            - name: storage
              mountPath: /var/lib/postgresql/data
      containers:
        - name: postgres
          image: {{ .Values.database.image }}
          env:
            - name: POSTGRES_DB
              value: {{ .Values.database.dbName | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.database.user | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.database.pass | quote }}
            - name: POSTGRES_HOST_AUTH_METHOD
              value: "trust"
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: msa-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
spec:
  ports:
    - port: 5432
  selector:
    app: postgres
