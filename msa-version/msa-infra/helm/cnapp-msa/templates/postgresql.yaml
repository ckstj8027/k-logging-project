# [K-Sentry 공식 명세] PostgreSQL PVC & Deployment (데이터베이스 자동 생성 버전)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: msa-postgres-pvc
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: manual
  resources:
    requests:
      storage: 8Gi
  volumeName: msa-postgres-pv
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-deployment
spec:
  selector:
    matchLabels:
      app: postgres
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: postgres
    spec:
      initContainers:
        - name: fix-pg-hba
          image: busybox
          command: 
            - sh
            - -c
            - |
              DATA_DIR=/var/lib/postgresql/data
              if [ -f $DATA_DIR/pg_hba.conf ]; then
                echo "host all all 0.0.0.0/0 trust" >> $DATA_DIR/pg_hba.conf
                echo "host all all ::/0 trust" >> $DATA_DIR/pg_hba.conf
                echo "Forcefully updated pg_hba.conf to trust all"
              else
                echo "pg_hba.conf not found. Skipping (initialization will handle it)."
              fi
          volumeMounts:
            - name: storage
              mountPath: /var/lib/postgresql/data
      containers:
        - name: postgres
          image: {{ .Values.database.image }}
          env:
            - name: POSTGRES_DB
              value: {{ .Values.database.dbName | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.database.user | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.database.pass | quote }}
            - name: POSTGRES_HOST_AUTH_METHOD
              value: "trust"
          ports:
            - containerPort: 5432
          # [핵심 추가] 컨테이너가 뜬 직후, cnappdb가 없으면 강제로 만듭니다.
          lifecycle:
            postStart:
              exec:
                command:
                  - sh
                  - -c
                  - |
                    until psql -U postgres -c "SELECT 1" > /dev/null 2>&1; do
                      echo "Waiting for postgres..."
                      sleep 2
                    done
                    psql -U postgres -tc "SELECT 1 FROM pg_database WHERE datname = 'cnappdb'" | grep -q 1 || psql -U postgres -c "CREATE DATABASE cnappdb"
                    echo "Database cnappdb ensured."
          volumeMounts:
            - name: storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: msa-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
spec:
  ports:
    - port: 5432
  selector:
    app: postgres
