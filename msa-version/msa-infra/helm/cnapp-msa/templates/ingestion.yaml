apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ingestion
  labels:
    app: ingestion
spec:
  replicas: {{ .Values.ingestion.replicaCount }}
  selector:
    matchLabels:
      app: ingestion
  template:
    metadata:
      labels:
        app: ingestion
    spec:
      # [추가] 인프라 대기 로직: DB와 Kafka가 준비될 때까지 앱 가동을 지연시킵니다.
      initContainers:
        - name: wait-for-infra
          image: busybox
          command: 
            - sh
            - -c
            - |
              until nc -z postgres-service 5432 && nc -z kafka-service 9092; do
                echo "Waiting for Postgres and Kafka..."
                sleep 2
              done
              echo "Infra is ready. Starting Ingestion service."
      containers:
        - name: ingestion
          image: "{{ .Values.ingestion.image.repository }}:{{ .Values.ingestion.image.tag }}"
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          readinessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          env:
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: "kafka-service:9092"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres-service:5432/{{ .Values.database.dbName }}"
            - name: SPRING_DATASOURCE_USERNAME
              value: "{{ .Values.database.user }}"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "{{ .Values.database.pass }}"
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-ingestion-service
spec:
  ports:
    - port: 8081
      targetPort: 8081
  selector:
    app: ingestion
