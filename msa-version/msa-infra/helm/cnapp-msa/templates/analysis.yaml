apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-analysis
  labels:
    app: analysis
spec:
  replicas: {{ .Values.analysis.replicaCount }}
  selector:
    matchLabels:
      app: analysis
  template:
    metadata:
      labels:
        app: analysis
    spec:
      # [추가] 인프라 대기 로직: 모든 핵심 인프라가 준비될 때까지 대기
      initContainers:
        - name: wait-for-infra
          image: busybox
          command: 
            - sh
            - -c
            - |
              until nc -z postgres-service 5432 && nc -z kafka-service 9092 && nc -z redis-service 6379; do
                echo "Waiting for Postgres, Kafka, and Redis..."
                sleep 2
              done
              echo "Infra is ready. Starting Analysis engine."
      containers:
        - name: analysis
          image: "{{ .Values.analysis.image.repository }}:{{ .Values.analysis.image.tag }}"
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
          env:
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: "kafka-service:9092"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres-service:5432/{{ .Values.database.dbName }}"
            - name: SPRING_DATASOURCE_USERNAME
              value: "{{ .Values.database.user }}"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "{{ .Values.database.pass }}"
            - name: SPRING_DATA_REDIS_HOST
              value: "redis-service"
            - name: SPRING_DATA_REDIS_PORT
              value: "6379"
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-analysis-service
spec:
  ports:
    - port: 8082
      targetPort: 8082
  selector:
    app: analysis
