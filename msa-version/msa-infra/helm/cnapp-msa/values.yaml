global:
  namespace: cnapp-msa

# --- Frontend (SvelteKit) ---
frontend:
  replicaCount: 1
  image:
    repository: ckstj8027/cnapp-front
    tag: latest
  service:
    port: 80

# --- MSA Backend Services ---
auth:
  replicaCount: 1
  image:
    repository: ckstj8027/msa-auth
    tag: latest
  service:
    port: 8084

ingestion:
  replicaCount: 1
  image:
    repository: ckstj8027/cnapp-msa-ingestion
    tag: latest
  service:
    port: 8081

analysis:
  replicaCount: 1
  image:
    repository: ckstj8027/cnapp-msa-analysis
    tag: latest
  service:
    port: 8082

query:
  replicaCount: 1
  image:
    repository: ckstj8027/cnapp-msa-query
    tag: latest
  service:
    type: ClusterIP
    port: 80

# --- Ingress Settings ---
ingress:
  enabled: true
  className: "nginx"
  host: ""

# --- DB Settings (Application needs to know these) ---
database:
  dbName: cnappdb
  user: postgres
  pass: password
