global:
  namespace: cnapp-msa

ingestion:
  replicaCount: 2
  image:
    repository: ckstj8027/cnapp-msa-ingestion
    tag: latest
  service:
    port: 8081

analysis:
  replicaCount: 2
  image:
    repository: ckstj8027/cnapp-msa-analysis
    tag: latest
  service:
    port: 8082

query:
  replicaCount: 2
  image:
    repository: ckstj8027/cnapp-msa-query
    tag: latest
  service:
    port: 80

# --- 기존에 성공했던 가벼운 설정값들 ---
kafka:
  image: docker.io/bitnami/kafka
  zookeeperImage: docker.io/bitnami/zookeeper

database:
  image: postgres:15
  dbName: cnappdb
  user: postgres
  pass: password
  storage: 1Gi

redis:
  image: redis:7.0-alpine
