global:
  namespace: cnapp-msa

ingestion:
  replicaCount: 2
  image:
    repository: ckstj8027/cnapp-msa-ingestion
    tag: latest
  service:
    port: 8081

analysis:
  replicaCount: 2
  image:
    repository: ckstj8027/cnapp-msa-analysis
    tag: latest
  service:
    port: 8082

query:
  replicaCount: 2
  image:
    repository: ckstj8027/cnapp-msa-query
    tag: latest
  service:
    port: 80

# --- KRaft 기반 카프카 설정 (ZooKeeper 제거) ---
kafka:
  image: apache/kafka:3.7.0
  serviceName: kafka-service
  port: 9092
  controllerPort: 9093

# --- PostgreSQL 설정 ---
database:
  image: postgres:15
  dbName: cnappdb
  user: postgres
  pass: password
  storage: 1Gi

# --- Redis 설정 ---
redis:
  image: redis:7.0-alpine
