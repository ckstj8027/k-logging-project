global:
  namespace: cnapp-msa

# --- Frontend (SvelteKit) ---
frontend:
  replicaCount: 1
  image:
    repository: ckstj8027/cnapp-front
    tag: latest
  service:
    port: 80

# --- MSA Backend Services ---
ingestion:
  replicaCount: 2
  image:
    repository: ckstj8027/cnapp-msa-ingestion
    tag: latest
  service:
    port: 8081

analysis:
  replicaCount: 2
  image:
    repository: ckstj8027/cnapp-msa-analysis
    tag: latest
  service:
    port: 8082

query:
  replicaCount: 2
  image:
    repository: ckstj8027/cnapp-msa-query
    tag: latest
  service:
    port: 8083

# --- Ingress Settings ---
ingress:
  enabled: true
  className: "nginx"
  host: "localhost" # 또는 사용자 클러스터 도메인

# --- Infrastructure Settings ---
kafka:
  image: apache/kafka:3.7.0
  serviceName: kafka-service
  port: 9092
  controllerPort: 9093

database:
  image: postgres:15
  dbName: cnappdb
  user: postgres
  pass: password
  storage: 1Gi

redis:
  image: redis:7.0-alpine
