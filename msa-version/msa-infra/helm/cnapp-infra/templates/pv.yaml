# [K-Sentry 공식 명세] 모든 인프라 PV 통합 정의
apiVersion: v1
kind: PersistentVolume
metadata:
  name: msa-postgres-pv
spec:
  capacity:
    storage: 8Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  hostPath:
    path: "/mnt/data/postgres-msa"
