<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.js';
  mermaid.initialize({ startOnLoad: false, theme: 'default' });

  document.addEventListener("DOMContentLoaded", function() {
    // 1. pre 태그뿐만 아니라 Jekyll이 감싸버린 highlight 클래스까지 모두 타겟으로 잡습니다.
    const codeBlocks = document.querySelectorAll('pre, .highlight, .highlighter-rouge');
    let index = 0;
    const processed = new Set(); // 중복 변환 방지
    
    codeBlocks.forEach((block) => {
      if (processed.has(block)) return;

      // 2. 내부의 모든 HTML 태그를 무시하고 오직 '순수 텍스트'만 추출합니다.
      let text = block.innerText || block.textContent;
      
      // 3. 눈에 안 보이는 유령 공백 제거 및 줄바꿈 공백을 하나로 압축하여 검사
      let cleanedText = text
        .replace(/[\u00a0\u200b\u200c\u200d\ufeff]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
      
      // 4. 어떤 구조 안에 갇혀있든 graph나 flowchart로 시작하면 머메이드로 인식
      if (/^(graph|flowchart|sequenceDiagram|gantt|classDiagram|erDiagram)/i.test(cleanedText)) {
        const div = document.createElement('div');
        div.className = 'mermaid';
        div.id = 'mermaid-' + index++;
        
        // 원본 텍스트의 유령 공백만 세척해서 주입
        div.textContent = text.replace(/[\u00a0\u200b\u200c\u200d\ufeff]/g, " ").trim();
        
        // 5. 상위 부모 중 Jekyll이 만든 가장 바깥쪽 코드 블록 전체를 복잡한 구조째로 바꿉니다.
        const targetContainer = block.closest('.highlighter-rouge') || block;
        
        if (!processed.has(targetContainer)) {
          targetContainer.parentNode.replaceChild(div, targetContainer);
          processed.add(targetContainer);
          processed.add(block);
        }
      }
    });

    // 6. 변환 완료 후 강제 렌더링
    mermaid.run();
  });
</script>

<style>
  .mermaid {
    display: flex;
    justify-content: center;
    background: #fdfdfd;
    padding: 15px;
    border-radius: 6px;
    border: 1px solid #e1e4e8;
    margin: 20px 0;
  }
</style>
