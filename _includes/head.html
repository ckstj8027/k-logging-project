<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.js';
  mermaid.initialize({ startOnLoad: false, theme: 'default' });

  document.addEventListener("DOMContentLoaded", function() {
    // 1. 모든 pre 태그를 가져옵니다.
    const preBlocks = document.querySelectorAll('pre');
    let index = 0;
    
    preBlocks.forEach((pre) => {
      // 2. 내부 순수 텍스트 추출
      let text = pre.innerText || pre.textContent;
      
      // 3. [핵심] 눈에 보이지 않는 특수 유령 공백 (\u00a0, \u200b 등)을 모두 일반 공백으로 강제 치환
      let cleanedText = text
        .replace(/[\u00a0\u200b\u200c\u200d\ufeff]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
      
      // 4. 세척된 텍스트가 머메이드 키워드로 시작하는지 유연하게 검사 (대소문자 무시)
      if (/^(graph|flowchart|sequenceDiagram|gantt|classDiagram|erDiagram)/i.test(cleanedText)) {
        const div = document.createElement('div');
        div.className = 'mermaid';
        div.id = 'mermaid-' + index++;
        
        // 5. 실제 다이어그램 엔진에 전달할 데이터도 특수 유령 공백을 일반 공백으로 변환하여 삽입
        div.textContent = text.replace(/[\u00a0\u200b\u200c\u200d\ufeff]/g, " ").trim();
        
        // 6. 기존 pre 구조를 날리고 mermaid div로 교체
        pre.parentNode.replaceChild(div, pre);
      }
    });

    // 7. 교체 작업 완료 후 렌더링 수행
    mermaid.run();
  });
</script>

<style>
  .mermaid {
    display: flex;
    justify-content: center;
    background: #fdfdfd;
    padding: 15px;
    border-radius: 6px;
    border: 1px solid #e1e4e8;
    margin: 20px 0;
  }
</style>
