<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.js';
  mermaid.initialize({ startOnLoad: false, theme: 'default' });

  document.addEventListener("DOMContentLoaded", function() {
    // 1. 클래스명과 상관없이 pre 태그 내부 내용에 머메이드 문법(graph, sequenceDiagram 등)이 있는지 전부 뒤집니다.
    const preBlocks = document.querySelectorAll('pre');
    let index = 0;
    
    preBlocks.forEach((pre) => {
      const text = pre.textContent.trim();
      // 내부 텍스트가 머메이드 문법으로 시작하는지 확인
      if (text.startsWith('graph') || text.startsWith('flowchart') || text.startsWith('sequenceDiagram')) {
        const div = document.createElement('div');
        div.className = 'mermaid';
        div.id = 'mermaid-' + index++;
        div.textContent = text;
        
        // 기존 pre 태그를 mermaid div로 깔끔하게 교체
        pre.parentNode.replaceChild(div, pre);
      }
    });

    // 2. 변환이 끝난 후 그래프를 한 번에 렌더링
    mermaid.run();
  });
</script>

<style>
  .mermaid {
    display: flex;
    justify-content: center;
    background: #fdfdfd;
    padding: 15px;
    border-radius: 6px;
    border: 1px solid #e1e4e8;
    margin: 20px 0;
  }
</style>
