<script type="module">
  import mermaid from '[https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.js](https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.js)';
  mermaid.initialize({ startOnLoad: false, theme: 'default' });

  document.addEventListener("DOMContentLoaded", function() {
    // 1. 지킬이 렌더링한 모든 code 태그와 pre 태그를 추적합니다.
    const blocks = document.querySelectorAll('pre code, pre');
    let index = 0;
    const processed = new Set();

    blocks.forEach((block) => {
      if (processed.has(block)) return;

      // 2. 내부 텍스트 추출 및 눈에 안 보이는 유령 공백 제거
      let text = block.innerText || block.textContent;
      let cleanedText = text.replace(/[\u00a0\u200b\u200c\u200d\ufeff]/g, " ").replace(/\s+/g, " ").trim();

      // 3. 지킬이 깨버린 HTML 특수기호들(&gt;, &lt;)을 원래 머메이드 문법(-->, ==>)으로 복원하는 핵심 로직
      // (innerText에서 복원이 안 되었을 경우를 대비해 하드코딩으로 한 번 더 치환합니다.)
      text = text.replace(/&gt;/g, '>').replace(/&lt;/g, '<').replace(/&amp;/g, '&');
      cleanedText = cleanedText.replace(/&gt;/g, '>').replace(/&lt;/g, '<').replace(/&amp;/g, '&');

      // 4. 본문 내에 graph 나 flowchart 문법이 감지되면 머메이드 영역으로 판단
      if (/^(graph|flowchart|sequenceDiagram|gantt|classDiagram|erDiagram)/i.test(cleanedText) || cleanedText.includes("graph TD") || cleanedText.includes("graph LR")) {
        
        // 머메이드 문법 시작점 검사 및 정제
        const startIndex = text.search(/(graph|flowchart|sequenceDiagram|gantt)/i);
        if (startIndex !== -1) {
          text = text.substring(startIndex);
        }

        const div = document.createElement('div');
        div.className = 'mermaid';
        div.id = 'mermaid-' + index++;
        div.textContent = text.trim();
        
        // 5. 최상위 pre 블록을 찾아 커스텀 다이어그램 div로 통째로 갈아 끼웁니다.
        const targetContainer = block.closest('pre') || block;
        
        if (!processed.has(targetContainer)) {
          targetContainer.parentNode.replaceChild(div, targetContainer);
          processed.add(targetContainer);
          processed.add(block);
        }
      }
    });

    // 6. 모든 요소가 다이어그램 수식 데이터로 치환되면 최종 렌더링 실행
    mermaid.run();
  });
</script>

<style>
  .mermaid {
    display: flex;
    justify-content: center;
    background: #fdfdfd;
    padding: 15px;
    border-radius: 6px;
    border: 1px solid #e1e4e8;
    margin: 20px 0;
  }
</style>
