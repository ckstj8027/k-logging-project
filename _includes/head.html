<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.js';
  mermaid.initialize({ startOnLoad: false, theme: 'default' });

  document.addEventListener("DOMContentLoaded", function() {
    // 모든 pre 태그를 가져옵니다.
    const preBlocks = document.querySelectorAll('pre');
    let index = 0;
    
    preBlocks.forEach((pre) => {
      // 내부에 불필요한 줄바꿈, 공백, 특수 공백(&nbsp;)을 제거하고 텍스트만 추출
      const text = pre.textContent.replace(/\u00a0/g, " ").trim();
      
      // graph, flowchart, sequenceDiagram 등의 단어가 포함되어 있는지 유연하게 검사
      if (/^(graph|flowchart|sequenceDiagram|gantt|classDiagram|erDiagram)/i.test(text)) {
        const div = document.createElement('div');
        div.className = 'mermaid';
        div.id = 'mermaid-' + index++;
        div.textContent = text;
        
        // 기존 pre 태그를 mermaid div로 교체
        pre.parentNode.replaceChild(div, pre);
      }
    });

    // 교체 완료 후 그래프 렌더링
    mermaid.run();
  });
</script>

<style>
  .mermaid {
    display: flex;
    justify-content: center;
    background: #fdfdfd;
    padding: 15px;
    border-radius: 6px;
    border: 1px solid #e1e4e8;
    margin: 20px 0;
  }
</style>
