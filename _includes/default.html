<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% seo %}
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
  </head>
  <body>
    <div class="container-lg px-3 my-5 markdown-body">
      {% if site.title and site.title != string_of_spaces %}
      <h1><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
      {% endif %}

      {{ content }}
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/anchor-js/4.1.0/anchor.min.js" integrity="sha256-lZaRhKri35AyJSypXXs4o6OPFTbTmUoltBbDCbdzegg=" crossorigin="anonymous"></script>
    <script>anchors.add();</script>

    <script type="module">
      import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.js';
      mermaid.initialize({ startOnLoad: false, theme: 'default' });

      function forceRenderMermaid() {
        // 지킬 렌더러가 감싸버릴 수 있는 모든 코드 블록 셀렉터를 동시 확보
        const selectors = 'pre code, pre, .highlighter-rouge, .language-plaintext, .language-mermaid';
        const blocks = document.querySelectorAll(selectors);
        let index = 0;
        const processed = new Set();

        blocks.forEach((block) => {
          if (processed.has(block)) return;

          let text = block.innerText || block.textContent;
          if (!text) return;
          
          // 1. 지킬 빌드 시 깨져서 들어간 HTML 특수 문자 부호들(--&gt;, ==&gt;) 원상 복구
          text = text.replace(/&gt;/g, '>').replace(/&lt;/g, '<').replace(/&amp;/g, '&');
          
          let cleanedText = text.replace(/[\u00a0\u200b\u200c\u200d\ufeff]/g, " ").trim();

          // 2. 텍스트 내부에 머메이드 문법 문장구조가 잡히는지 검사
          if (/^(graph|flowchart|sequenceDiagram|gantt|classDiagram|erDiagram)/i.test(cleanedText) || cleanedText.includes("graph TD") || cleanedText.includes("graph LR")) {
            
            const startIndex = text.search(/(graph|flowchart|sequenceDiagram|gantt)/i);
            if (startIndex !== -1) {
              text = text.substring(startIndex);
            }

            // 3. 순수 텍스트 데이터를 주입한 커스텀 머메이드 div 생성
            const div = document.createElement('div');
            div.className = 'mermaid';
            div.id = 'mermaid-render-engine-' + index++;
            div.textContent = text.trim();
            
            // 4. 지킬이 지저분하게 감싸놓은 래퍼 박스(.highlighter-rouge 등)를 통째로 갈아끼움
            const targetContainer = block.closest('.highlighter-rouge') || block.closest('pre') || block;
            
            if (!processed.has(targetContainer)) {
              const parent = targetContainer.parentNode;
              if (parent) {
                parent.replaceChild(div, targetContainer);
                processed.add(targetContainer);
                processed.add(block);
              }
            }
          }
        });

        // 5. 렌더링 강제 가동
        mermaid.run();
      }

      // DOM 로드 즉시 실행 및 레이아웃 밀림 방지 더블 트리거 레이어 세팅
      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", forceRenderMermaid);
      } else {
        forceRenderMermaid();
      }
      window.addEventListener("load", function() {
        setTimeout(forceRenderMermaid, 150);
      });
    </script>

    <style>
      .mermaid {
        display: flex !important;
        justify-content: center !important;
        background: #fdfdfd !important;
        padding: 20px !important;
        border-radius: 8px !important;
        border: 1px solid #e1e4e8 !important;
        margin: 25px 0 !important;
        box-shadow: 0 1px 3px rgba(27,31,35,0.05) !important;
      }
    </style>
  </body>
</html>
