<!-- Jekyll 코드 블록을 Mermaid 다이어그램으로 강제 변환 -->
{% if page.mermaid %}
<script>
  var config = {
    startOnLoad: true,
    theme: 'default',
    flowchart: {
      useMaxWidth: false,
      htmlLabels: true
    }
  };
  mermaid.initialize(config);
  window.mermaid.init(undefined, document.querySelectorAll('.language-mermaid'));
</script>
{% endif %}
