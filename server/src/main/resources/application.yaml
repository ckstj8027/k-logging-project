spring:
  application:
    name: cnapp-server
  datasource:



    url: ${DB_URL:jdbc:postgresql://localhost:5432/cnappdb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 50           # 한 번에 50개씩 묶어서 실행
          order_inserts: true        # Insert 순서 최적화 (Batch 확률 높임)
          order_updates: true        # Update 순서 최적화
          batch_versioned_data: true # PostgreSQL Sequence 방식에서 배치 최적화 활성화
  # 배열(Timestamp) 대신 문자열로 출력
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

logging:
  level:
    com.k8s.cnapp.server: DEBUG

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expiration: 86400000 # 1 day

