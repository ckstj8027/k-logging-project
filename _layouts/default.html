---
layout: default
---

<div class="post-content">
  {{ content }}
</div>

<script>
  document.addEventListener("DOMContentLoaded", function() {
    document.querySelectorAll("pre code.language-mermaid").forEach(function(element) {
      const pre = element.parentNode;
      const div = document.createElement("div");
      div.className = "mermaid";
      
      // textContent 대신 innerText나 기존 innerHTML 가공을 통해 
      // 한 줄로 뭉쳐진 코드를 안전하게 개행 처리합니다.
      let codeText = element.innerText || element.textContent;
      
      // 만약 공백이나 특정 포맷 때문에 한 줄로 뭉쳤다면 줄바꿈을 명시적으로 처리
      if (!codeText.includes('\n') && codeText.includes('subgraph')) {
        codeText = codeText
          .replace(/graph (TD|LR|BR|RL)/g, 'graph $1\n')
          .replace(/subgraph /g, '\nsubgraph ')
          .replace(/end/g, '\nend\n')
          .replace(/%%/g, '\n%%')
          .replace(/style /g, '\nstyle ');
      }
      
      div.textContent = codeText;
      pre.parentNode.replaceChild(div, pre);
    });

    // 3. 변환이 끝난 후 Mermaid 라이브러리를 동적 로드하여 초기화합니다.
    import('https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.js')
      .then((mermaidModule) => {
        const mermaid = mermaidModule.default;
        mermaid.initialize({ 
          startOnLoad: true, 
          theme: 'default', // 기본 깔끔한 테마 사용 (dark, forest 등으로 변경 가능)
          securityLevel: 'loose'
        });
        mermaid.init(undefined, document.querySelectorAll('.mermaid'));
      });
  });
</script>

<style>
  .mermaid {
    display: flex;
    justify-content: center;
    background: #fdfdfd;
    padding: 20px;
    border-radius: 6px;
    border: 1px solid #e1e4e8;
    margin: 20px 0;
  }
</style>
