<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
</head>
<body>

    {{ content }}

    <script type="module">
        import mermaid from '[https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.js](https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.js)';
        mermaid.initialize({ startOnLoad: true });
    </script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // 마크다운의 ```mermaid 블록을 찾습니다.
            document.querySelectorAll("pre code.language-mermaid").forEach(function(element) {
                const pre = element.parentNode;
                const div = document.createElement("div");
                div.className = "mermaid";
                div.textContent = element.textContent;
                pre.parentNode.replaceChild(div, pre);
            });
        });
    </script>

</body>
</html>
