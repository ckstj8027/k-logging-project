# 1. Spring Boot Backend (API Server)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cnapp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cnapp-server
  template:
    metadata:
      labels:
        app: cnapp-server
    spec:
      containers:
      - name: server
        image: ckstj8027/cnapp-server:latest
        ports:
        - containerPort: 8080
        imagePullPolicy: Always
        env:
        - name: DB_URL
          # MySQL 서비스 이름을 'mysql'로 참조합니다.
          value: "jdbc:mysql://mysql:3306/cnappdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
        - name: DB_USERNAME
          value: "root"
        - name: DB_PASSWORD
          value: "password"
---
apiVersion: v1
kind: Service
metadata:
  name: cnapp-server
spec:
  type: ClusterIP
  selector:
    app: cnapp-server
  ports:
    - port: 8080
      targetPort: 8080
---
# 2. SvelteKit Frontend
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cnapp-front
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cnapp-front
  template:
    metadata:
      labels:
        app: cnapp-front
    spec:
      containers:
      - name: front
        image: ckstj8027/cnapp-front:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: cnapp-front
spec:
  type: ClusterIP
  selector:
    app: cnapp-front
  ports:
    - port: 80
      targetPort: 80
---
# 3. Ingress (트래픽 통합 관리)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cnapp-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    # /api/users 요청을 백엔드에 전달할 때 /users로 변경하고 싶다면 rewrite 설정이 필요할 수 있습니다.
 #   nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: cnapp-server
            port:
              number: 8080
      - path: /
        pathType: Prefix
        backend:
          service:
            name: cnapp-front
            port:
              number: 80